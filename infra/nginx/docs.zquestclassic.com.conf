# Use Perl to define a lowercase version of the URI for redirection
# This module must be enabled in the main nginx.conf
perl_set $uri_lowercase 'sub {
    my $r = shift;
    my $uri = lc($r->uri);
    return $uri;
}';

server {
    listen      80;
    server_name docs.zquestclassic.com;
    return 301 https://docs.zquestclassic.com$request_uri;
}

server {
    server_name docs.zquestclassic.com;
    listen [::]:443 ssl; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/docs.zquestclassic.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/docs.zquestclassic.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

    root /var/www/docs.zquestclassic.com;
    index index.html;

    # Lowercase redirection: Game -> game
    # We use $uri (internal) because we only want to redirect if the path itself is uppercase.
    # Since our files on disk are lowercase, internal index resolution will be lowercase
    # and won't trigger this loop.
    if ($uri ~ [A-Z]) {
        return 301 $uri_lowercase$is_args$args;
    }

    # Redirect .html requests to extensionless URLs
    # We MUST use $request_uri here to avoid loops with internal index.html resolution.
    if ($request_uri ~ ^/([^?]*)\.html(?:\?|$) ) {
        return 301 /$1$is_args$args;
    }

    # Redirect /index to the directory root
    if ($request_uri ~ ^/([^?]*)/index(?:\?|$) ) {
        return 301 /$1/$is_args$args;
    }

    # Redirect root index
    if ($request_uri ~ ^/index(?:\?|$) ) {
        return 301 /;
    }

    # Strip trailing slash only when not a real directory — prevents 404s for /foo/bar/
    # when the actual file on disk is /foo/bar.html, without looping on real dirs like /zscript/
    if (!-d $request_filename) {
        rewrite ^(.+)/$ $1 permanent;
    }

    location / {
        # Try to serve the file as-is, then with .html, then as a directory
        try_files $uri $uri.html $uri/ =404;
    }

    # Custom error page for 404
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}
